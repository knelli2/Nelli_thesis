[project]
name = "thesis-plotting"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "scri>=2024.0.10",
    "h5py>=3.16.0",
    "matplotlib>=3.10.8",
    "numpy>=2.2.6",
]

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

