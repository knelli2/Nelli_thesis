name: Build LaTeX PDF

on:
  push:
    branches-ignore:
      - 'ci-latexmk-pdf'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: nelli_kyle_2026_thesis.tex
          latexmk_use_lualatex: false
          args: -pdf -jobname=NelliKyle2026Thesis -synctex=1 -interaction=nonstopmode -file-line-error

      - name: Deploy PDF to orphan branch
        run: |
          git checkout --orphan ci-latexmk-pdf
          git rm -rf .
          git add NelliKyle2026Thesis.pdf
          git -c user.name='Kyle Nelli (CI)' -c user.email='kcnelli21@gmail.com' commit -m "PDF built from ${{ github.sha }}"
        
      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ci-latexmk-pdf
          force: true
