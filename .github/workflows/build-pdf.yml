name: Build LaTeX PDF

on:
  push:
    branches-ignore:
      - 'ci-latexmk-pdf'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: nelli_kyle_2026_thesis.tex
          latexmk_use_lualatex: false
          args: -pdf -jobname=NelliKyle2026Thesis -synctex=1 -interaction=nonstopmode -file-line-error

      - name: Deploy PDF to orphan branch
        run: |
          git config user.name "Kyle Nelli (CI)"
          git config user.email "kcnelli21@gmail.com"

          git checkout --orphan ci-latexmk-pdf
          git rm -rf .
          git add NelliKyle2026Thesis.pdf
          git commit -m "PDF built from ${{ github.sha }}"
          git push origin ci-latexmk-pdf
